<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{nombre_perfil}} - TarjetaDigital</title>
  <meta name="description" content="Tarjeta digital de {{nombre_perfil}}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{nombre_perfil}}">
  <meta property="og:description" content="Tarjeta digital de contacto">
  <meta property="og:image" content="{{og_image}}">
  <meta property="og:url" content="{{base_url}}/u/{{slug}}">
  <meta property="og:type" content="profile">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{nombre_perfil}}">
  <meta name="twitter:description" content="Tarjeta digital de contacto">
  <meta name="twitter:image" content="{{og_image}}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ---- Reset ---- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --color-accent: {{color}};
      --color-glass-bg: rgba(255,255,255,0.05);
      --color-glass-border: rgba(255,255,255,0.1);
      --color-text-primary: #ffffff;
      --color-text-secondary: rgba(255,255,255,0.7);
      --color-text-muted: rgba(255,255,255,0.4);
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 50%;
      --transition-fast: 0.15s ease;
    }

    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ---- Avatar ---- */
    .avatar {
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-xl { width: 120px; height: 120px; }

    /* ---- Profile Header ---- */
    .profile-header {
      text-align: center;
      padding: 32px 16px 16px;
    }
    .profile-foto {
      margin: 0 auto 16px;
      border: 3px solid var(--color-accent);
    }
    .profile-initials {
      font-size: 2.5rem;
      background: var(--color-accent);
    }
    .profile-name {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .profile-tipo {
      display: inline-block;
      background: var(--color-glass-bg);
      border: 1px solid var(--color-glass-border);
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 50px;
      color: var(--color-text-secondary);
      text-transform: capitalize;
      margin-top: 8px;
    }

    /* ---- Action Bar ---- */
    .action-bar {
      position: sticky;
      top: 0;
      background: rgba(15,12,41,0.97);
      padding: 12px;
      display: flex;
      justify-content: center;
      gap: 12px;
      z-index: 100;
      border-bottom: 1px solid var(--color-glass-border);
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      min-width: 70px;
      padding: 8px 16px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      color: #fff;
      font-weight: 500;
      font-family: inherit;
      text-decoration: none;
      transition: transform var(--transition-fast), opacity var(--transition-fast);
      background: var(--color-glass-bg);
    }
    .action-btn:hover { transform: scale(1.05); }
    .action-btn:active { transform: scale(0.95); }
    .action-btn.call { background: var(--color-accent); }
    .action-btn.whatsapp { background: #25D366; }
    .action-btn.email { background: #FF6B35; }
    .action-btn .action-icon { font-size: 1.3rem; }

    /* ---- Container ---- */
    .container { max-width: 480px; padding: 0 16px; margin: 0 auto; }

    /* ---- Sections ---- */
    .section { padding: 16px 0; }
    .section-title {
      color: var(--color-text-secondary);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    /* ---- Contact Items ---- */
    .contact-item {
      background: var(--color-glass-bg);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }
    .contact-item:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(4px);
    }
    .contact-icon {
      width: 44px;
      height: 44px;
      min-width: 44px;
      background: var(--color-glass-bg);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    .contact-info { display: flex; flex-direction: column; min-width: 0; }
    .contact-label { color: var(--color-text-muted); font-size: 0.75rem; }
    .contact-value {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---- Social Grid ---- */
    .social-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .social-btn {
      width: 100%;
      aspect-ratio: 1;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-glass-bg);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background var(--transition-fast), transform var(--transition-fast);
    }
    .social-btn:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }

    /* ---- File Items ---- */
    .file-item {
      background: var(--color-glass-bg);
      border: 1px solid var(--color-glass-border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      margin-bottom: 8px;
      text-decoration: none;
      color: inherit;
      transition: background var(--transition-fast);
    }
    .file-item:hover { background: rgba(255,255,255,0.08); }

    /* ---- Save Contact Bar ---- */
    .save-contact-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px;
      background: rgba(15,12,41,0.97);
      border-top: 1px solid var(--color-glass-border);
      z-index: 100;
    }
    .save-contact-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
      padding: 0 24px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, var(--color-accent), #8B83FF);
      color: #fff;
      text-decoration: none;
      font-family: inherit;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      gap: 8px;
    }
    .save-contact-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(108,99,255,0.3);
    }

    /* ---- Branding ---- */
    .branding {
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.75rem;
      padding: 16px;
      padding-bottom: 80px;
    }
    .branding a { color: #8B83FF; }
    .branding a:hover { text-decoration: underline; }

    /* ---- Animations ---- */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    body { animation: fadeIn 0.4s ease; }
    .profile-header { animation: slideUp 0.5s ease; }
    .contact-item, .file-item { animation: fadeIn 0.4s ease backwards; }
    .contact-item:nth-child(1) { animation-delay: 0.1s; }
    .contact-item:nth-child(2) { animation-delay: 0.15s; }
    .contact-item:nth-child(3) { animation-delay: 0.2s; }
    .contact-item:nth-child(4) { animation-delay: 0.25s; }
    .contact-item:nth-child(5) { animation-delay: 0.3s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body class="profile-public">

  <!-- Profile Header -->
  <header class="profile-header">
    {{avatar_html}}
    <h1 class="profile-name">{{nombre_perfil}}</h1>
    <span class="profile-tipo">{{tipo}}</span>
  </header>

  <!-- Action Bar -->
  <div class="action-bar">
    {{action_buttons_html}}
  </div>

  <!-- Main Content -->
  <main class="container">
    {{campos_section_html}}
    {{archivos_section_html}}
  </main>

  <!-- Save Contact -->
  <footer class="save-contact-bar">
    <a href="/api/perfiles/{{slug}}/vcard" class="save-contact-btn">📥 Guardar contacto</a>
  </footer>

  <p class="branding">Creado con <a href="{{base_url}}">TarjetaDigital</a></p>

  <!-- Analytics Script -->
  <script>
    (function(){
      var pid = {{perfil_id}};
      if (pid && navigator.sendBeacon) {
        navigator.sendBeacon('/api/estadisticas',
          new Blob([JSON.stringify({perfil_id:pid,evento:'visita'})],{type:'application/json'})
        );
      }
      document.querySelectorAll('.action-btn').forEach(function(btn){
        btn.addEventListener('click',function(){
          var action = btn.getAttribute('data-action');
          if (action && navigator.sendBeacon) {
            navigator.sendBeacon('/api/estadisticas',
              new Blob([JSON.stringify({perfil_id:pid,evento:action})],{type:'application/json'})
            );
          }
        });
      });
    })();
  </script>
</body>
</html>
